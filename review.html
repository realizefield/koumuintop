<!DOCTYPE html><html lang="ja"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>復習ページ | GAMBA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Meiryo',sans-serif;background:#f0f4f8;color:#222;line-height:1.85;font-size:15px}
ruby rt{font-size:10px;color:#888}
a{color:inherit;text-decoration:none}

/* ナビ */
.nav{background:#1B2A4A;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.35)}
.nav-in{max-width:960px;margin:0 auto;display:flex;align-items:stretch;flex-wrap:wrap}
.nav-brand{padding:10px 16px;font-size:14px;font-weight:bold;color:#fff;border-right:1px solid rgba(255,255,255,.15);display:flex;align-items:center;gap:6px;white-space:nowrap}
.nav-brand small{font-size:11px;color:#8ab4d8;font-weight:normal}
.nav-links{display:flex;flex-wrap:wrap;flex:1}
.nav-links a{color:rgba(255,255,255,.8);padding:10px 10px;font-size:13px;display:flex;align-items:center;border-bottom:3px solid transparent;transition:.15s;white-space:nowrap}
.nav-links a:hover{color:#fff;background:rgba(255,255,255,.08)}
.nav-links a.cur{color:#fff;border-bottom-color:#C0392B;font-weight:bold}
.nav-links a.ex{color:#ffd96a}
.nav-links a.rv{background:#C0392B;color:#fff;margin:5px 6px 5px 2px;padding:5px 12px;border-radius:6px;border-bottom:none;font-size:12px}
.nav-links a.rv:hover{background:#a93226}

/* レイアウト */
.main{max-width:960px;margin:0 auto;padding:20px 14px 80px}

/* ヒーローヘッダー */
.hero{background:#1B2A4A;border-radius:14px;padding:22px 26px;margin-bottom:20px;color:#fff;overflow:hidden;position:relative}
.hero::before{content:'';position:absolute;right:-30px;top:-30px;width:140px;height:140px;border-radius:50%;background:rgba(192,57,43,.2)}
.hero .tag{display:inline-block;background:#C0392B;color:#fff;font-size:11px;padding:3px 10px;border-radius:10px;margin-bottom:8px}
.hero h1{font-size:21px;font-weight:bold;margin-bottom:5px;position:relative}
.hero p{font-size:13px;color:#8ab4d8;position:relative}

/* ポイントカード */
.pts{background:#fff;border-radius:12px;padding:18px 20px;margin-bottom:18px;border-left:5px solid #C0392B}
.pts h3{font-size:14px;font-weight:bold;color:#C0392B;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.pt{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #f2f2f2;align-items:flex-start}
.pt:last-child{border-bottom:none}
.pn{min-width:24px;height:24px;background:#1B2A4A;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;flex-shrink:0;margin-top:3px}
.pk{color:#C0392B;font-weight:bold}

/* カード */
.card{background:#fff;border-radius:12px;padding:20px 22px;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.ch{font-size:17px;font-weight:bold;color:#1B2A4A;padding-bottom:10px;border-bottom:2px solid #EBF5FB;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.cn{background:#1B2A4A;color:#fff;width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}

/* 本文 */
.txt{font-size:15px;line-height:1.95;color:#2c3e50;margin-bottom:10px}

/* 用語ポップアップ */
.kw{color:#1A5276;font-weight:bold;cursor:pointer;border-bottom:1px dashed #1A5276;transition:.1s}
.kw:hover{background:#EBF5FB;border-radius:3px}
.pop{display:none;position:fixed;z-index:500;background:#1B2A4A;color:#fff;border-radius:10px;padding:14px 18px;max-width:290px;font-size:13px;line-height:1.75;box-shadow:0 6px 24px rgba(0,0,0,.35);pointer-events:none}
.pop.on{display:block;pointer-events:auto}
.pop-x{float:right;cursor:pointer;color:#8ab4d8;font-size:16px;margin:-2px -4px 0 8px;pointer-events:auto}

/* 例え話ボックス */
.ex-box{background:#fffbea;border-left:4px solid #f39c12;border-radius:0 8px 8px 0;padding:12px 16px;margin:12px 0;font-size:14px;line-height:1.8}
.ex-box b{color:#a04000}

/* 図解 */
.diag{background:#f8fafc;border-radius:10px;padding:10px;margin:14px 0;overflow-x:auto}

/* テーブル */
.tbl{width:100%;border-collapse:collapse;font-size:14px;margin:12px 0}
.tbl th{background:#1B2A4A;color:#fff;padding:9px 12px;text-align:left;font-size:13px}
.tbl td{padding:9px 12px;border-bottom:1px solid #eaf0f6;vertical-align:top;line-height:1.75}
.tbl tr:nth-child(even) td{background:#f8fafc}
.tbl td:first-child{font-weight:bold;color:#1A5276;background:#EBF5FB}
.badge{background:#C0392B;color:#fff;font-size:11px;padding:2px 7px;border-radius:8px;margin-left:5px;font-weight:normal}

/* 穴埋め */
.blank{display:inline-block;min-width:72px;border-bottom:2.5px solid #C0392B;color:#C0392B;font-weight:bold;text-align:center;padding:2px 5px;margin:0 2px;cursor:pointer;border-radius:4px 4px 0 0;background:#fff8f8;transition:.15s;font-size:15px}
.blank.ok{background:#e8f8f0;border-color:#27ae60;color:#1e8449}
.blank.ng{background:#fdecea;border-color:#e74c3c;animation:sh .3s}
@keyframes sh{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* 語群 */
.wb{background:#EBF5FB;border:2px solid #1A5276;border-radius:10px;padding:12px 16px;margin:14px 0;display:none}
.wb-h{font-size:12px;font-weight:bold;color:#1A5276;margin-bottom:9px}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{background:#fff;border:2px solid #1A5276;border-radius:20px;padding:6px 14px;font-size:14px;cursor:pointer;color:#1A5276;font-weight:bold;user-select:none;transition:.15s}
.chip:hover,.chip.sel{background:#1A5276;color:#fff}
.chip.used{opacity:.3;pointer-events:none;text-decoration:line-through}

/* ボタン */
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 18px;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;border:none;transition:.15s;text-decoration:none}
.b-navy{background:#1B2A4A;color:#fff}.b-navy:hover{background:#2c3e6e}
.b-red{background:#C0392B;color:#fff}.b-red:hover{background:#a93226}
.b-out{background:#fff;border:2px solid #1B2A4A;color:#1B2A4A}.b-out:hover{background:#1B2A4A;color:#fff}
.b-sm{padding:6px 14px;font-size:13px}
.b-orange{background:#e67e22;color:#fff}.b-orange:hover{background:#ca6f1e}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:14px 0}

/* タイマー */
.timer{background:#f8fafc;border:2px solid #EBF5FB;border-radius:10px;padding:12px 18px;margin:14px 0;display:none}
.t-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.t-num{font-size:26px;font-weight:bold;color:#1B2A4A;min-width:52px;font-variant-numeric:tabular-nums}
.t-bar{flex:1;height:9px;background:#ddeef8;border-radius:5px;overflow:hidden}
.t-fill{height:100%;background:#1A5276;border-radius:5px;transition:width 1s linear}
.sc-row{display:flex;gap:8px;flex-wrap:wrap}
.sc{background:#fff;border:1.5px solid #dde8f0;border-radius:8px;padding:7px 14px;text-align:center;min-width:76px}
.sc .v{font-size:19px;font-weight:bold;color:#1B2A4A}
.sc .l{font-size:11px;color:#999;margin-top:1px}

/* 結果 */
.result{display:none;background:#e8f8f0;border:2px solid #1e8449;border-radius:10px;padding:16px 20px;margin:12px 0;text-align:center}
.result.on{display:block}
.result .big{font-size:21px;font-weight:bold;color:#1e8449;margin-bottom:6px}

/* チャット */
.chat{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.chat-h{background:#1B2A4A;color:#fff;padding:11px 18px;font-size:14px;font-weight:bold}
.chat-msgs{padding:12px;min-height:88px;max-height:220px;overflow-y:auto;background:#fafafa;display:flex;flex-direction:column;gap:9px}
.bub{padding:9px 13px;border-radius:12px;font-size:14px;max-width:88%;line-height:1.7}
.bub.u{background:#1B2A4A;color:#fff;align-self:flex-end;border-bottom-right-radius:3px}
.bub.a{background:#fff;border:1.5px solid #e4e4e4;align-self:flex-start;border-bottom-left-radius:3px}
.chat-in{display:flex;border-top:1.5px solid #e8e8e8}
.chat-in input{flex:1;border:none;padding:10px 14px;font-size:14px;outline:none;font-family:'Meiryo',sans-serif}
.chat-in button{background:#1B2A4A;color:#fff;border:none;padding:0 18px;cursor:pointer;font-size:13px;font-weight:bold}

/* 復習ボタン */
.rv-btn{display:inline-flex;align-items:center;gap:6px;background:#fff;border:2px solid #e67e22;color:#e67e22;padding:8px 16px;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;transition:.15s}
.rv-btn.on,.rv-btn:hover{background:#e67e22;color:#fff}

.qcard{margin-bottom:20px}

.qd{color:#f39c12;font-size:15px}
.qr{color:#bbb;font-size:12px;font-style:italic}

.choices{display:flex;flex-direction:column;gap:7px}
.cho{display:flex;align-items:flex-start;gap:11px;padding:11px 15px;border:2px solid #e8edf2;border-radius:8px;cursor:pointer;transition:.15s;font-size:15px;line-height:1.75}
.cho:hover{border-color:#1A5276;background:#EBF5FB}

.cho.ng{border-color:#e74c3c;background:#fdecea;pointer-events:none}
.cho.dim{pointer-events:none;opacity:.8}
.cnum{min-width:22px;font-weight:bold;color:#1B2A4A;flex-shrink:0;margin-top:2px}
.sol{display:none;margin-top:12px;border-radius:8px;overflow:hidden}
.sol-h{background:#1e8449;color:#fff;padding:10px 16px;font-size:15px;display:flex;align-items:center;gap:8px}
.sol-h strong{font-size:18px}
.sol-h span{margin-left:auto;font-size:12px;color:#a8e6c0;font-style:italic}
.sol-b{background:#e8f8f0;border:2px solid #1e8449;border-top:none;padding:15px}
.sol-exp{font-size:14px;line-height:1.75;margin-bottom:10px}
.sol-ce{display:flex;gap:8px;padding:4px 0;border-top:1px solid #c8e6c9;font-size:13px;line-height:1.65}
.sol-ce:first-of-type{border-top:none;padding-top:8px}
.ce-ok{color:#1e8449;font-weight:bold}

.final{display:none;background:#e8f8f0;border:2px solid #1e8449;border-radius:12px;padding:20px;margin:16px 0;text-align:center}

.tex .tv{font-size:19px;font-weight:bold;color:#1B2A4A;font-variant-numeric:tabular-nums;min-width:46px}

/* 復習ページ */
.rc{background:#fff;border-radius:12px;padding:16px 20px;margin-bottom:12px;border-left:5px solid #e67e22;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.rc-h{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;align-items:flex-start;margin-bottom:10px}
.rc-t{font-size:16px;font-weight:bold;color:#1B2A4A}
.rc-d{font-size:12px;color:#bbb;margin-top:2px}
.tally{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:8px 0}
.tl{font-size:13px;color:#e67e22;font-weight:bold;min-width:90px}

.tm.on{background:#e67e22;color:#fff}
.tm-add{border-style:dashed;font-size:18px;line-height:1}
.memo{width:100%;border:1.5px solid #e0e0e0;border-radius:8px;padding:9px;font-size:14px;margin-top:8px;resize:vertical;min-height:60px;font-family:'Meiryo',sans-serif;line-height:1.7}
.memo:focus{border-color:#e67e22;outline:none}

  .nav-brand small{display:none}

<div class="main">
<div class="hero">
  <div class="tag">復習ページ</div>
  <h1>復習リスト</h1>
  <p>保存した単元を繰り返し学習しましょう。「覚えた」ら削除して整理できます。</p>
</div>
<div id="list"></div>
<div id="empty" style="display:none;text-align:center;padding:60px 20px;color:#aaa;font-size:16px">
  復習リストは空です。<br>
  <span style="font-size:13px">各ページの「復習ページに保存」から追加できます。</span>

<script>

const SK='gamba2';
function gR(){try{return JSON.parse(localStorage.getItem(SK+'_r'))||[];}catch(e){return[];}}
function sR(a){localStorage.setItem(SK+'_r',JSON.stringify(a));}
function addR(o){const a=gR();if(!a.find(i=>i.id===o.id)){a.push({...o,saved:Date.now(),cnt:0,memo:''});sR(a);}}
function rmR(id){sR(gR().filter(i=>i.id!==id));}
function gSc(pid){try{return JSON.parse(localStorage.getItem(SK+'_s_'+pid))||[];}catch(e){return[];}}
function sSc(pid,d){const a=gSc(pid);a.unshift({t:Date.now(),d});localStorage.setItem(SK+'_s_'+pid,JSON.stringify(a.slice(0,3)));}

/* ポップアップ辞書 */
const DICT={
  '行政':'国や都道府県・市町村などが、国民のために行う仕事のこと。税金の徴収、道路の整備、許可証の発行などが含まれます。',
  '行政法':'行政に関する法律の理論のことです。「行政法」という名前の法律があるわけではなく、行政全体に共通するルールをまとめたものです。',
  '法律':'ここでは「国会が作った法律」のことだけを指します。内閣が作る政令や各省庁の省令・規則、地方議会が作る条例は含まれません。',
  '行政行為':'行政庁が国民に対して、一方的に権利や義務を発生させる行為のこと。課税処分や営業許可などが代表例です。',
  '行政庁':'行政主体（国や都道府県など）の代わりに、実際に行政を行う機関のこと。税務署長や市長などがその例です。',
  '公定力':'たとえ違法な行政行為でも、裁判所などが正式に取り消すまでは「有効なもの」として扱われる効力のこと。',
  '不可争力':'取消訴訟を起こせる期間（原則6か月）が過ぎると、国民がその行政行為の効力を争えなくなる効力のこと。',
  '代執行':'義務者が命令を守らない場合に、行政が代わりにその作業を行い、費用を後から請求できる制度。違法建築の取り壊しなどが例。',
  '侵害行政':'国民の権利や自由を制限・侵害する行政活動のこと。課税や営業停止命令などが例です。',
  '給付行政':'国民に利益・サービスを提供する行政活動のこと。補助金の支給や公共施設の提供などが例です。',
  '取消訴訟':'行政行為が違法であるとして、裁判所にその取消しを求める訴訟のこと。出訴期間（原則6か月）があります。',
  '瑕疵':'キズ・欠陥のこと。行政行為の「瑕疵」とは、法律違反などの問題があることを意味します。',
  '遡及効':'さかのぼって効力が生じること。取消しには遡及効があり、最初から無効だったことになります。',
  '秩序罰':'義務違反に対して科される過料のこと。刑法は適用されず、前科もつきません。行政刑罰とは別です。',
};

function showPop(word, e){
  const desc = DICT[word] || word+'の説明はありません。';
  const p = document.getElementById('pop');
  p.querySelector('.pop-body').textContent = desc;
  p.querySelector('.pop-word').textContent = word;
  p.classList.add('on');
  const px = Math.min(e.clientX, window.innerWidth - 310);
  const py = e.clientY + window.scrollY + 20;
  p.style.left = px + 'px';
  p.style.top  = py + 'px';
  e.stopPropagation();
}
function hidePop(){document.getElementById('pop').classList.remove('on');}
document.addEventListener('click', hidePop);

function speak(txt){
  if(!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(txt);
  u.lang='ja-JP'; u.rate=0.88;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}

async function askAI(q, ctx){
  const out = document.getElementById('cout');
  const ub = document.createElement('div'); ub.className='bub u'; ub.textContent=q;
  out.appendChild(ub); out.scrollTop=out.scrollHeight;
  const ab = document.createElement('div'); ab.className='bub a'; ab.textContent='考え中...';
  out.appendChild(ab);
  try{
    const r = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,
        system:'公務員試験（地方上級・国家一般職）の行政法専門講師です。初学者に丁寧に、身近な例えを使って150字以内で答えてください。学習ページ: '+ctx,
        messages:[{role:'user',content:q}]})});
    const d = await r.json();
    ab.textContent = d.content?.[0]?.text || '回答できませんでした。';
  }catch(e){ ab.textContent='通信エラーです。'; }
  out.scrollTop=out.scrollHeight;
}

function initChat(ctx){
  const b=document.getElementById('csend'), i=document.getElementById('cinp');
  if(!b||!i)return;
  b.onclick=()=>{const q=i.value.trim();if(!q)return;i.value='';askAI(q,ctx);};
  i.onkeydown=e=>{if(e.key==='Enter')b.click();};
}

function initRvBtn(pid,title,file){
  const btn=document.getElementById('rvbtn');
  if(!btn)return;
  if(gR().find(i=>i.id===pid)){btn.classList.add('on');btn.textContent='復習に追加済み ✓';}
  btn.onclick=()=>{
    const ex=gR().find(i=>i.id===pid);
    if(ex){rmR(pid);btn.classList.remove('on');btn.textContent='復習ページに保存';}
    else{addR({id:pid,title,file});btn.classList.add('on');btn.textContent='復習に追加済み ✓';}
  };
}

function render(){
  const items=gR(), list=document.getElementById('list'), emp=document.getElementById('empty');
  if(!items.length){list.innerHTML='';emp.style.display='block';return;}
  emp.style.display='none';
  list.innerHTML=items.map((item,i)=>{
    const d=new Date(item.saved).toLocaleDateString('ja-JP');
    const cls='tm on'; const marks=Array.from({length:item.cnt||0},(_,j)=>'<div class="'+cls+'" onclick="rmM('+i+','+j+')">正</div>').join('');
    return '<div class="rc"><div class="rc-h">'+
      '<div><div class="rc-t">'+item.title+'</div><div class="rc-d">保存日: '+d+'</div></div>'+
      '<div style="display:flex;gap:7px;flex-wrap:wrap">'+
        '<a href="'+item.file+'" class="btn b-navy b-sm">ページへ</a>'+
        '<button class="btn b-sm" style="background:#1e8449;color:#fff" onclick="done('+i+')">覚えた・削除</button>'+
      '</div>'+
    '</div>'+
    '<div class="tally"><span class="tl">復習回数（正の字）</span>'+
      '<div class="tmarks" id="tm'+i+'">'+marks+'<div class="tm tm-add" onclick="addM('+i+')">+</div></div>'+
    '</div>'+
    '<textarea class="memo" placeholder="メモ（苦手ポイント・覚え方など）" onchange="saveM('+i+',this.value)">'+( item.memo||'')+'</textarea>'+
    '</div>';
  }).join('');
}
function addM(i){const a=gR();if(!a[i])return;a[i].cnt=(a[i].cnt||0)+1;sR(a);render();}
function rmM(i,j){const a=gR();if(!a[i])return;a[i].cnt=Math.max(0,(a[i].cnt||1)-1);sR(a);render();}
function done(i){if(!confirm('復習リストから削除しますか？'))return;const a=gR();a.splice(i,1);sR(a);render();}
function saveM(i,v){const a=gR();if(!a[i])return;a[i].memo=v;sR(a);}
document.addEventListener('DOMContentLoaded',render);
</script></body></html>
